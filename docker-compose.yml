services:
  mongodb:
    image: mongo:7
    container_name: cartforge-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - cartforge_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  cartforge_mongo_data:
